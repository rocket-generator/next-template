version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - npm ci --cache .npm --prefer-offline
        build:
          commands:
            - rm -rf amplify-compute-bundle-output
            - echo "BETTER_AUTH_BASE_URL=$BETTER_AUTH_BASE_URL" >> .env
            - echo "BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET" >> .env
            - echo "NEXT_PUBLIC_BETTER_AUTH_BASE_URL=$NEXT_PUBLIC_BETTER_AUTH_BASE_URL" >> .env
            - echo "NEXT_PUBLIC_BETTER_AUTH_BASE_PATH=$NEXT_PUBLIC_BETTER_AUTH_BASE_PATH" >> .env
            - echo "NEXT_SERVER_COMPONENT_BACKEND_API_BASE_URL=$NEXT_SERVER_COMPONENT_BACKEND_API_BASE_URL" >> .env
            - echo "NEXT_PUBLIC_CLIENT_COMPONENT_BACKEND_API_BASE_URL=$NEXT_PUBLIC_CLIENT_COMPONENT_BACKEND_API_BASE_URL" >> .env
            - echo "DATABASE_URL=$DATABASE_URL" >> .env
            - echo "ENABLE_EMAIL_VERIFICATION=$ENABLE_EMAIL_VERIFICATION" >> .env
            - echo "NEXT_PUBLIC_APP_URL=$NEXT_PUBLIC_APP_URL" >> .env
            - echo "APP_URL=$APP_URL" >> .env
            - echo "ENABLE_AUTH_PAGE_REDIRECT=$ENABLE_AUTH_PAGE_REDIRECT" >> .env
            - echo "ENABLE_AVATAR_SETTING=$ENABLE_AVATAR_SETTING" >> .env
            - echo "SYSTEM_AWS_ACCESS_KEY_ID=$SYSTEM_AWS_ACCESS_KEY_ID" >> .env
            - echo "SYSTEM_AWS_SECRET_ACCESS_KEY=$SYSTEM_AWS_SECRET_ACCESS_KEY" >> .env
            - echo "SYSTEM_AWS_SES_REGION=$SYSTEM_AWS_SES_REGION" >> .env
            - echo "SYSTEM_AWS_S3_REGION=$SYSTEM_AWS_S3_REGION" >> .env
            - echo "SYSTEM_AWS_S3_BUCKET=$SYSTEM_AWS_S3_BUCKET" >> .env
            - echo "SYSTEM_AWS_SQS_QUEUE_URL=$SYSTEM_AWS_SQS_QUEUE_URL" >> .env
            - echo "SYSTEM_AWS_SQS_REGION=$SYSTEM_AWS_SQS_REGION" >> .env
            # Amplify uses the bundled CA file path as the standard TLS configuration.
            - echo "DATABASE_SSL_CA_PATH=$DATABASE_SSL_CA_PATH" >> .env
            - rm -rf .next
            - npm run db:generate
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - .npm/**/*
    appRoot: .
